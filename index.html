<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جامع الأمير فواز - مواقيت الصلاة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@500;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold-3d: linear-gradient(to bottom, #f1d592 0%, #d4af37 40%, #b2945e 100%);
            --real-gold: #d4af37;
            --soft-gold: #f1d592;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: url('https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?q=80&w=2000') center/cover no-repeat fixed;
            color: #fff; font-family: 'Tajawal', sans-serif; height: 100vh; overflow: hidden;
        }

        .wrapper { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; }

        /* شريط علوي فخم */
        .top-bar { 
            background: rgba(0, 0, 0, 0.7); display: flex; justify-content: space-between; align-items: center;
            padding: 20px 60px; border-bottom: 3px solid var(--real-gold);
            backdrop-filter: blur(10px);
        }

        .date-info { font-size: 1.5rem; color: #fff; text-shadow: 2px 2px 4px #000; }

        /* اسم الجامع بنمط الخط الذي أرفقته */
        .mosque-name { 
            font-family: 'Amiri', serif; 
            font-size: 4rem; 
            color: var(--soft-gold);
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
            font-weight: 700;
        }

        .main-content { 
            display: grid; grid-template-columns: 450px 1fr; gap: 40px; 
            padding: 40px; flex: 1; align-items: center;
        }

        /* لوحة الوقت الجانبية */
        .left-panel { 
            background: rgba(0, 0, 0, 0.5); border: 2px solid var(--real-gold); 
            border-radius: 30px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 80%; backdrop-filter: blur(15px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        #digi-time { font-size: 10rem; font-weight: 900; color: var(--real-gold); line-height: 1; text-shadow: 5px 5px 15px #000; }
        #ampm { font-size: 3rem; color: var(--real-gold); margin-bottom: 30px; }

        .next-prayer-card {
            border-top: 2px solid rgba(212, 175, 55, 0.3); padding-top: 30px; width: 85%; text-align: center;
        }

        /* الأذكار العائمة */
        .center-panel { text-align: center; padding: 20px; }
        #zikr-text { 
            font-size: 4.5rem; font-weight: 900; line-height: 1.5; color: var(--soft-gold);
            text-shadow: 4px 4px 15px rgba(0,0,0,1), 0 0 20px rgba(0,0,0,0.8);
            transition: opacity 0.8s ease-in-out;
        }

        /* شريط المواقيت السفلي المكبر */
        .bottom-grid { 
            display: grid; grid-template-columns: repeat(6, 1fr); 
            height: 260px; background: rgba(0, 0, 0, 0.85); border-top: 5px solid var(--real-gold);
            backdrop-filter: blur(10px);
        }

        .p-box { 
            border-left: 1px solid rgba(212, 175, 55, 0.2); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: all 0.3s;
        }
        
        .p-box.active { 
            background: rgba(212, 175, 55, 0.2); border-top: 15px solid var(--real-gold);
        }

        /* نصوص 3D للمواقيت */
        .p-box .name { 
            font-size: 2.2rem; font-weight: 900; margin-bottom: 15px;
            background: var(--gold-3d); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 2px #000);
        }

        .p-box .time { 
            font-size: 3.8rem; font-weight: 900; 
            background: var(--gold-3d); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 4px #000);
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="top-bar">
            <div class="date-info" id="en-date">--</div>
            <div class="mosque-name">جامع الأمير فواز - جدة</div>
            <div class="date-info" id="ar-date" style="text-align: left;">--</div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div id="digi-time">00:00</div>
                <div id="ampm">--</div>
                <div class="next-prayer-card">
                    <p style="font-size: 1.5rem; color: #fff;">الصلاة القادمة</p>
                    <span id="next-prayer-name" style="color:var(--real-gold); font-weight:900; font-size:3rem;">--</span>
                </div>
            </div>

            <div class="center-panel">
                <div id="zikr-text">أستغفر الله العظيم</div>
            </div>
        </div>

        <div class="bottom-grid" id="prayer-list"></div>
    </div>

<script>
    const prayerSchedule = [
        { n: 'الفجر', t: '5:21 ص' },
        { n: 'الشروق', t: '6:38 ص' },
        { n: 'الظهر', t: '12:31 م' },
        { n: 'العصر', t: '3:52 م' },
        { n: 'المغرب', t: '6:24 م' },
        { n: 'العشاء', t: '7:54 م' }
    ];

    function updateDashboard() {
        const now = new Date();
        let h = now.getHours();
        const m = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('digi-time').innerText = `${h % 12 || 12}:${m}`;
        document.getElementById('ampm').innerText = h >= 12 ? 'مساءً' : 'صباحاً';

        document.getElementById('en-date').innerText = now.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
        document.getElementById('ar-date').innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', {day:'numeric', month:'long', year:'numeric'}).format(now);

        const currentMinutes = h * 60 + now.getMinutes();
        let nextIndex = 0;
        if (currentMinutes > (19 * 60 + 54)) nextIndex = 0;
        else if (currentMinutes > (18 * 60 + 24)) nextIndex = 5;
        else if (currentMinutes > (15 * 60 + 52)) nextIndex = 4;
        else if (currentMinutes > (12 * 60 + 31)) nextIndex = 3;
        else if (currentMinutes > (6 * 60 + 38)) nextIndex = 2;
        else if (currentMinutes > (5 * 60 + 21)) nextIndex = 1;
        else nextIndex = 0;

        document.getElementById('next-prayer-name').innerText = prayerSchedule[nextIndex].n;

        const grid = document.getElementById('prayer-list');
        grid.innerHTML = prayerSchedule.map((p, index) => `
            <div class="p-box ${index === nextIndex ? 'active' : ''}">
                <div class="name">${p.n}</div>
                <div class="time">${p.t}</div>
            </div>
        `).join('');
    }

    const azkar = [
        "«سبحان الله وبحمده، سبحان الله العظيم»",
        "«لا إله إلا الله وحده لا شريك له، له الملك وله الحمد»",
        "«اللهم صلِ وسلم على نبينا محمد»",
        "«أستغفر الله العظيم وأتوب إليه»",
        "«لا حول ولا قوة إلا بالله العلي العظيم»"
    ];
    let zIdx = 0;
    function cycleZikr() {
        const textElem = document.getElementById('zikr-text');
        textElem.style.opacity = 0;
        setTimeout(() => {
            textElem.innerText = azkar[zIdx];
            textElem.style.opacity = 1;
            zIdx = (zIdx + 1) % azkar.length;
        }, 800);
    }

    cycleZikr();
    setInterval(cycleZikr, 15000);
    setInterval(updateDashboard, 1000);
    updateDashboard();
</script>
</body>
</html>
